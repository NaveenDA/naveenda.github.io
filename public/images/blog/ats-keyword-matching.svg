<svg width="860" height="340" viewBox="0 0 860 340" xmlns="http://www.w3.org/2000/svg">
  <rect width="860" height="340" fill="#f8fafc" rx="14"/>

  <text x="430" y="28" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#111827">How ATS Compares Your Resume to the Job Description</text>

  <!-- Left header: JD -->
  <rect x="20" y="40" width="360" height="36" rx="8" fill="#115e59"/>
  <text x="200" y="63" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="white">Job Description Requires</text>

  <!-- Right header: Resume -->
  <rect x="480" y="40" width="360" height="36" rx="8" fill="#374151"/>
  <text x="660" y="63" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="white">Your Resume Contains</text>

  <!-- ── Matched keywords (teal pills, same y) ── -->

  <!-- Python - row y=95 -->
  <rect x="90" y="95" width="220" height="28" rx="14" fill="#115e59"/>
  <text x="200" y="114" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="white">Python</text>

  <rect x="550" y="95" width="220" height="28" rx="14" fill="#115e59"/>
  <text x="660" y="114" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="white">Python</text>

  <!-- connecting line -->
  <line x1="312" y1="109" x2="548" y2="109" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="5,3"/>
  <circle cx="312" cy="109" r="3" fill="#0d9488"/>
  <circle cx="548" cy="109" r="3" fill="#0d9488"/>

  <!-- Machine Learning - row y=139 -->
  <rect x="90" y="139" width="220" height="28" rx="14" fill="#115e59"/>
  <text x="200" y="158" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="white">Machine Learning</text>

  <rect x="550" y="139" width="220" height="28" rx="14" fill="#115e59"/>
  <text x="660" y="158" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="white">Machine Learning</text>

  <line x1="312" y1="153" x2="548" y2="153" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="5,3"/>
  <circle cx="312" cy="153" r="3" fill="#0d9488"/>
  <circle cx="548" cy="153" r="3" fill="#0d9488"/>

  <!-- AWS - row y=183 -->
  <rect x="90" y="183" width="220" height="28" rx="14" fill="#115e59"/>
  <text x="200" y="202" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="white">AWS</text>

  <rect x="550" y="183" width="220" height="28" rx="14" fill="#115e59"/>
  <text x="660" y="202" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="white">AWS</text>

  <line x1="312" y1="197" x2="548" y2="197" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="5,3"/>
  <circle cx="312" cy="197" r="3" fill="#0d9488"/>
  <circle cx="548" cy="197" r="3" fill="#0d9488"/>

  <!-- ── Unmatched JD keywords (red - missing from resume) ── -->
  <rect x="90" y="227" width="220" height="28" rx="14" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="200" y="246" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#dc2626">Team Leadership</text>

  <rect x="90" y="271" width="220" height="28" rx="14" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="200" y="290" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#dc2626">CI/CD</text>

  <!-- ── Resume-only keywords (gray - not in JD) ── -->
  <rect x="550" y="227" width="220" height="28" rx="14" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="660" y="246" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#94a3b8">Deep Learning</text>

  <rect x="550" y="271" width="220" height="28" rx="14" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="660" y="290" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#94a3b8">Docker</text>

  <!-- Legend -->
  <rect x="170" y="315" width="14" height="14" rx="3" fill="#115e59"/>
  <text x="190" y="326" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">Matched</text>

  <rect x="290" y="315" width="14" height="14" rx="3" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="310" y="326" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">Missing from your resume</text>

  <rect x="490" y="315" width="14" height="14" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="510" y="326" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">Not in this JD</text>

  <!-- Score callout -->
  <text x="430" y="308" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#dc2626">3 of 5 required keywords matched - low score</text>
</svg>
